live<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordZeddBR - Live Dashboard</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/style_z.css">
</head>
<body>

    <header class="top-bar">
        <div class="header-left">
            <div class="logo-container">
                <img src="../imagens/LordZedd-site.png" alt="Logo" class="main-logo">
                <span class="brand-name"></span>
            </div>
            <details class="social-dropdown">
                <summary class="social-trigger">SOCIAIS ▾</summary>
                <div class="dropdown-content">
                    <a href="https://www.instagram.com/lordzeddbr" target="_blank">Instagram</a>
                    <a href="https://www.youtube.com/@lordzeddbr" target="_blank">Youtube</a>
                    <a href="https://www.twitch.tv/lordzeddbr" target="_blank">Twitch</a>
                    <a href="https://www.tiktok.com/@lordzeddbr" target="_blank">Tiktok</a>
                    <a href="https://www.speedrun.com/users/lordzeddbr" target="_blank">Speedruns</a>
                </div>
            </details>
        </div>
        
        <div class="header-right">
            <span class="players-label">PLAYERS:</span>
            <nav class="stream-selector">
                <button type="button" onclick="updatePlayer('youtube')">YOUTUBE</button>
                <button type="button" onclick="updatePlayer('twitch')">TWITCH</button>
                <button type="button" onclick="updatePlayer('kick')">KICK</button>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="video-section">
            <div class="video-wrapper">
                <iframe id="videoMaster" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </section>

        <aside class="chat-section">
            <iframe id="chatFrame" src="https://socialstream.ninja/dock.html?session=pRftJeqMLi&alignbottom&hidemenu&strokecolor=%23ffffff&font=Roboto&color&fontcolor=000000"></iframe>
        </aside>
    </main>

    <footer class="main-footer">
        LordZeddBR - 2026 - Todos os direitos do site reservados - O personagem Lord Zedd BR é uma homenagem ao personagem original pertencente a Saban, sem nenhum vínculo com esse canal.
    </footer>

    <script src="../js/super_live.js"></script>
</body>
</html>
