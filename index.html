<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordZeddBR - Live Dashboard</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/player.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-retro">

    <header class="top-bar">
        <div class="logo">LordZeddBR</div>
        
        <nav class="stream-selector">
            <button type="button" onclick="updatePlayer('youtube')">YouTube</button>
            <button type="button" onclick="updatePlayer('twitch')">Twitch</button>
            <button type="button" onclick="updatePlayer('kick')">Kick</button>
        </nav>

        <div class="view-controls">
            <label class="switch">
                <input type="checkbox" id="togglePlayer" checked>
                <span class="slider"></span> Player
            </label>
            <label class="switch">
                <input type="checkbox" id="toggleChat" checked>
                <span class="slider"></span> Chat
            </label>
        </div>
    </header>

    <div class="main-container">
        <section id="playerSection" class="video-section">
            <div class="video-wrapper">
                <iframe id="videoMaster" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>

            <div id="gallery" class="video-grid">
                </div>
        </section>

        <aside id="chatSection" class="chat-section">
            <iframe id="chatFrame" src="about:blank"></iframe>
        </aside>
    </div>

    <script src="../js/super_live.js"></script>
</body>
</html>
