<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordZeddBR - Live Panel</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-retro"> <aside class="sidebar">
        <div class="logo">LORD ZEDD</div>
        
        <div class="menu-group">
            <h3>Plataformas</h3>
            <button onclick="updatePlayer('youtube')">YouTube</button>
            <button onclick="updatePlayer('twitch')">Twitch</button>
            <button onclick="updatePlayer('kick')">Kick</button>
        </div>

        <div class="menu-group">
            <h3>Configurações</h3>
            <label><input type="checkbox" id="toggleChat" checked> Mostrar Chat</label>
            <label><input type="checkbox" id="togglePlayer" checked> Mostrar Player</label>
        </div>

        <div class="menu-group">
            <h3>Temas</h3>
            <select id="themeSelect">
                <option value="theme-retro">Retro</option>
                <option value="theme-dark">Dark</option>
                <option value="theme-light">Light</option>
            </select>
        </div>
    </aside>

    <main class="main-content">
        <section id="playerContainer" class="video-container">
            <div class="video-wrapper">
                <iframe id="videoMaster" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div id="gallery" class="video-grid"></div>
        </section>

        <section id="chatContainer" class="chat-wrapper">
            <iframe id="chatFrame" src=""></iframe>
        </section>
    </main>

    <script src="../js/super_live.js"></script>
</body>
</html>
