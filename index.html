<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordZeddBR - Live Dashboard</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="top-bar">
        <div class="header-left">
            <div class="logo-container">
                <img src="caminho_para_seu_logo.png" alt="Logo" class="main-logo">
                <span class="brand-name">LordZeddBR</span>
            </div>
            <div class="dropdown">
                <button class="dropbtn">SOCIAIS <span class="arrow">▾</span></button>
                <div class="dropdown-content">
                    <a href="#"><img src="icon-instagram.png" class="nav-icon"> Instagram</a>
                    <a href="#"><img src="icon-twitch.png" class="nav-icon"> Twitch</a>
                    <a href="#"><img src="icon-youtube.png" class="nav-icon"> Youtube</a>
                    <a href="#"><img src="icon-tiktok.png" class="nav-icon"> Tiktok</a>
                    <a href="#"><img src="icon-twitter.png" class="nav-icon"> X/Twitter</a>
                    <a href="#"><img src="icon-speedruns.png" class="nav-icon"> Speedruns</a>
                </div>
            </div>
        </div>
        </div>

        
        
        <div class="header-right">
            <span class="players-label">PLAYERS:</span>
            <nav class="stream-selector">
                <button type="button" onclick="updatePlayer('youtube')">YOUTUBE</button>
                <button type="button" onclick="updatePlayer('twitch')">TWITCH</button>
                <button type="button" onclick="updatePlayer('kick')">KICK</button>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="video-section">
            <div class="video-wrapper">
                <iframe id="videoMaster" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </section>

        <aside class="chat-section">
            <iframe id="chatFrame" src="SUA_URL_DE_CHAT_AQUI"></iframe>
        </aside>
    </main>

    <footer class="main-footer">
        LordZeddBR - 2026 - Todos os direitos do site reservados - O personagem Lord Zedd BR é uma homenagem ao personagem original pertencente a Saban, sem nenhum vínculo com esse canal.
    </footer>

    <script src="../js/super_live.js"></script>
</body>
</html>
