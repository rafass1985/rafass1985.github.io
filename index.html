<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordZeddBR - Live Dashboard</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="top-bar">
        <div class="header-left">
            <div class="logo-container">
                <span class="brand-name">LordZeddBR</span>
            </div>
            
            <details class="dropdown">
                <summary class="btn btn-sm btn-neutral">SOCIAIS</summary>
                <ul class="dropdown-content">
                    <li><a href="#"><i class="icon">📸</i> Instagram</a></li>
                    <li><a href="#"><i class="icon">💜</i> Twitch</a></li>
                    <li><a href="#"><i class="icon">🔴</i> Youtube</a></li>
                    <li><a href="#"><i class="icon">🎵</i> Tiktok</a></li>
                    <li><a href="#"><i class="icon">❌</i> X/Twitter</a></li>
                    <li><a href="#"><i class="icon">🏆</i> Speedruns</a></li>
                </ul>
            </details>
        </div>
        
        <div class="header-right">
            <span class="players-label">PLAYERS:</span>
            <nav class="stream-selector">
                <button type="button" onclick="updatePlayer('youtube')">YOUTUBE</button>
                <button type="button" onclick="updatePlayer('twitch')">TWITCH</button>
                <button type="button" onclick="updatePlayer('kick')">KICK</button>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="video-section">
            <div class="video-wrapper">
                <iframe id="videoMaster" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </section>

        <aside class="chat-section">
            <iframe id="chatFrame" src="SUA_URL_DE_CHAT_AQUI"></iframe>
        </aside>
    </main>

    <footer class="main-footer">
        LordZeddBR - 2026 - Todos os direitos reservados.
    </footer>

    <script src="../js/ultimate.player.js"></script>
</body>
</html>
