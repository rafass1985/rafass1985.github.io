<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordZeddBR - Multistream</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/player.css">
    <style>
        /* Estilos da Top Bar e Layout */
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .top-bar {
            height: 60px;
            background: #111;
            border-bottom: 2px solid #008ba3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }

        .logo {
            color: #008ba3;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .stream-selector {
            display: flex;
            gap: 10px;
        }

        .stream-selector button {
            background: #ff4d3d;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .stream-selector button:hover { background: #fff; }

        .view-controls {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 10px;
            gap: 10px;
        }

        .video-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border: 2px solid #008ba3;
        }

        #videoMaster {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .chat-section {
            flex: 1;
            min-width: 320px;
            border: 2px solid #008ba3;
            background: #0a0a0a;
            transition: all 0.3s;
        }

        #chatFrame { width: 100%; height: 100%; border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">LordZeddBR Live</div>
        
        <nav class="stream-selector">
            <button onclick="updatePlayer('youtube')">YouTube Live</button>
            <button onclick="updatePlayer('twitch')">Twitch</button>
            <button onclick="updatePlayer('kick')">Kick</button>
        </nav>

        <div class="view-controls">
            <label><input type="checkbox" id="togglePlayer" checked> Player</label>
            <label><input type="checkbox" id="toggleChat" checked> Chat</label>
        </div>
    </header>

    <div class="main-container">
        <section id="playerContainer" class="video-section">
            <div class="video-wrapper">
                <iframe id="videoMaster" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            <div id="gallery" class="video-grid"></div>
        </section>

        <aside id="chatContainer" class="chat-section">
            <iframe id="chatFrame" src="SUA_URL_DO_CHAT_AQUI"></iframe>
        </aside>
    </div>

    <script src="../js/super_live.js"></script>
</body>
</html>
