<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção - LordZeddBR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="construction-container">
        <div class="illustration">
            <img src="https://img.freepik.com/vetores-premium/personagem-de-trabalhador-da-construcao-civil-em-fundo-branco_25030-39328.jpg" alt="Trabalhadores em construção">
        </div>

        <h1>Em construção</h1>
        <p class="description">
            Nosso site está em construção, estamos trabalhando muito para lhe dar a melhor experiência com este.
        </p>

        <div class="notify-section">
            <p>Avise-me quando estiver pronto</p>
            <form class="subscribe-form">
                <input type="email" placeholder="EMAIL" required>
                <button type="submit">ME AVISE</button>
            </form>
        </div>
    </main>
</body>
</html>
